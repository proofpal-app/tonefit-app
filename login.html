<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Log In | ToneFit</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563EB;--blue-dark:#1D4ED8;--text:#0D1117;--muted:#6B7280;--border:#E5E7EB;--bg:#F0F4FA}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:20px 24px;display:flex;align-items:center}
.hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;background:#fff;border:none;padding:12px 14px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.10)}
.hamburger span{width:20px;height:2px;background:#1a1a2e;border-radius:2px;display:block}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s}
.menu-overlay.open{opacity:1;pointer-events:all}
.slide-menu{position:fixed;top:0;left:0;width:300px;height:100vh;background:white;z-index:400;transform:translateX(-100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;padding:28px 24px 32px;overflow-y:auto}
.slide-menu.open{transform:translateX(0)}
.menu-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
.menu-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;color:var(--text);text-decoration:none}
.menu-logo-icon{width:38px;height:38px;border-radius:10px;overflow:hidden;flex-shrink:0}
.menu-close{background:none;border:none;font-size:22px;color:#9CA3AF;cursor:pointer}
.menu-section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9CA3AF;margin-bottom:8px;margin-top:20px}
.menu-item{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:10px;text-decoration:none;color:var(--text);font-size:16px;font-weight:500;transition:background 0.18s;margin-bottom:2px}
.menu-item:hover{background:#F3F4F6}
.menu-item-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.menu-item-icon svg{width:20px;height:20px;stroke:#6B7280;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.menu-item:hover .menu-item-icon svg{stroke:var(--blue)}
.menu-divider{height:1px;background:#F3F4F6;margin:18px 0}
.menu-login{display:block;text-align:center;padding:12px;font-size:16px;font-weight:600;color:var(--text);text-decoration:none;margin-bottom:10px;border-radius:12px;transition:background 0.18s}
.menu-login:hover{background:#F3F4F6}
.menu-signup{display:block;background:var(--blue);color:white;text-align:center;padding:15px;border-radius:14px;font-size:16px;font-weight:700;text-decoration:none}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px}
.login-card{background:white;border:1.5px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:420px}
.login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.login-title{font-size:26px;font-weight:800;letter-spacing:-0.8px;text-align:center;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:white;border:1.5px solid var(--border);border-radius:12px;padding:13px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:background 0.2s,box-shadow 0.2s;margin-bottom:24px}
.google-btn:hover{background:#F9FAFB;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider span{font-size:13px;color:var(--muted);font-weight:500}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:14px;font-weight:700;margin-bottom:8px;color:#0D1117}
.form-group input{width:100%;padding:14px 18px;border:1.5px solid #E5E7EB;border-radius:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:#0D1117;background:white;outline:none;transition:border-color 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.form-group input:focus{border-color:#2563EB;background:white}
.form-group input::placeholder{color:#9CA3AF}
.login-btn{width:100%;background:#2563EB;color:white;border:none;padding:16px;border-radius:100px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:background 0.2s;margin-top:8px;letter-spacing:-0.2px}
.login-btn:hover{background:#1D4ED8}
.login-footer{text-align:center;margin-top:20px;font-size:14px;color:#6B7280}
.login-footer a{color:#2563EB;text-decoration:none;font-weight:700}
footer{background:#0F0F13;color:rgba(255,255,255,0.8);padding:40px 48px 24px}
.footer-bottom{max-width:1100px;margin:0 auto;text-align:center}
.footer-bottom p{font-size:13px;color:rgba(255,255,255,0.28)}
</style>
</head>
<body>
<div class="menu-overlay" id="menuOverlay"></div>
<div class="slide-menu" id="slideMenu">
  <div class="menu-header">
    <a href="/" class="menu-logo">
      <div class="menu-logo-icon"><svg width="38" height="38" viewBox="0 0 38 38"><rect width="38" height="38" rx="9" fill="#2563EB"/><line x1="13" y1="7" x2="13" y2="31" stroke="white" stroke-width="2.4" stroke-linecap="round"/><line x1="19" y1="5" x2="19" y2="31" stroke="white" stroke-width="2.4" stroke-linecap="round"/><line x1="25" y1="7" x2="25" y2="31" stroke="white" stroke-width="2.4" stroke-linecap="round"/><line x1="10" y1="26" x2="28" y2="26" stroke="white" stroke-width="2.4" stroke-linecap="round"/><polyline points="15,18 19,23 27,13" fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span>Tone<span style="color:#2563EB">Fit</span></span>
    </a>
    <button class="menu-close" id="menuClose">✕</button>
  </div>
  <div class="menu-section-label">Discover</div>
  <a href="/app" class="menu-item"><span class="menu-item-icon"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span>Match Tones</a>
  <div class="menu-section-label">Account</div>
  <a href="/plans" class="menu-item"><span class="menu-item-icon"><svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg></span>Plans</a>
  <div class="menu-divider"></div>
  <a href="/login" class="menu-login">Login</a>
  <a href="/signup" class="menu-signup">Sign Up</a>
</div>
<nav><button class="hamburger" id="menuOpen"><span></span><span></span><span></span></button></nav>

<main class="main">
  <div class="login-card">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 36 36"><rect width="36" height="36" rx="9" fill="#2563EB"/><line x1="12" y1="7" x2="12" y2="29" stroke="white" stroke-width="2.4" stroke-linecap="round"/><line x1="18" y1="5" x2="18" y2="29" stroke="white" stroke-width="2.4" stroke-linecap="round"/><line x1="24" y1="7" x2="24" y2="29" stroke="white" stroke-width="2.4" stroke-linecap="round"/><line x1="9" y1="24" x2="27" y2="24" stroke="white" stroke-width="2.4" stroke-linecap="round"/><polyline points="14,17 18,22 26,12" fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span style="font-size:22px;font-weight:800;letter-spacing:-0.5px">Tone<span style="color:#2563EB">Fit</span></span>
    </div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to continue matching tones</p>
    <button class="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="divider"><div class="divider-line"></div><span>or</span><div class="divider-line"></div></div>
    <div class="form-group"><label>Email</label><input type="email" placeholder="you@example.com"/></div>
    <div class="form-group">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <label style="margin-bottom:0">Password</label>
        <a href="/forgot-password" style="font-size:13px;font-weight:700;color:#2563EB;text-decoration:none">Forgot password?</a>
      </div>
      <input type="password" placeholder="Enter your password"/>
    </div>
    <button class="login-btn">Sign In</button>
    <div class="login-footer">Don't have an account? <a href="/signup">Sign up</a></div>
  </div>
</main>

<footer><div class="footer-bottom"><p>© 2026 ToneFit. All rights reserved.</p></div></footer>
<script>
document.getElementById('menuOpen').addEventListener('click',()=>{document.getElementById('slideMenu').classList.add('open');document.getElementById('menuOverlay').classList.add('open')});
document.getElementById('menuClose').addEventListener('click',()=>{document.getElementById('slideMenu').classList.remove('open');document.getElementById('menuOverlay').classList.remove('open')});
document.getElementById('menuOverlay').addEventListener('click',()=>{document.getElementById('slideMenu').classList.remove('open');document.getElementById('menuOverlay').classList.remove('open')});
</script>
</body></html>
