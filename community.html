let filters = {instrument:'All', part:'All Parts', tone:'All Tones'};
let sortBy = 'Top';

function setFilter(type, val) {
  filters[type] = val;
  document.querySelectorAll('.pill').forEach(p => {
    if(p.textContent.trim() === val) p.classList.add('active');
    else if(['All','🎸 Guitar','🎸 Bass'].includes(p.textContent.trim()) && type==='instrument') p.classList.remove('active');
    else if(['All Parts','Riff','Solo'].includes(p.textContent.trim()) && type==='part') p.classList.remove('active');
    else if(['All Tones','Clean','Distorted'].includes(p.textContent.trim()) && type==='tone') p.classList.remove('active');
  });
  renderTones();
}

function setSort(val) {
  sortBy = val;
  document.querySelectorAll('.pill').forEach(p => {
    if(['Top','Popular','Recent'].includes(p.textContent.trim())) p.classList.toggle('active', p.textContent.trim()===val);
  });
  renderTones();
}

function filterTones() { renderTones(); }

function renderTones() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = tones.filter(t => {
    const matchSearch = !search || t.song.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search) || t.genre.toLowerCase().includes(search);
    const matchInstrument = filters.instrument==='All' || t.instrument===filters.instrument;
    const matchPart = filters.part==='All Parts' || t.part===filters.part;
    const matchTone = filters.tone==='All Tones' || t.tone===filters.tone;
    return matchSearch && matchInstrument && matchPart && matchTone;
  });
  if(sortBy==='Top') filtered.sort((a,b)=>b.likes-a.likes);
  else if(sortBy==='Popular') filtered.sort((a,b)=>b.versions-a.versions);
  const grid = document.getElementById('toneGrid');
  grid.innerHTML = filtered.map(t => `
    <a href="/tone?id=${t.id}" class="tone-card">
      <div class="tone-song">${t.song}</div>
      <div class="tone-artist">${t.artist}</div>
      <div class="tone-tags">
        <span class="tag-grey">🎸 ${t.instrument}</span>
        <span class="tag-grey">${t.part}</span>
        <span class="${t.tone==='Distorted'?'tag-distorted':'tag-clean'}">${t.tone}</span>
        <span class="tag-versions">${t.versions} versions</span>
      </div>
      <div class="tone-gear">🎸 ${t.guitar.substring(0,20)}... + 🔊 ${t.amp.substring(0,20)}...</div>
      <div class="tone-meta">
        <span class="genre-badge genre-${t.genre.toLowerCase()}">${t.genre}</span>
        <span class="decade">${t.decade}</span>
      </div>
      <div class="tone-footer">
        <span class="like-count">👍 ${t.likes}</span>
        <button class="view-btn">View Tone</button>
      </div>
    </a>`).join('');
}

renderTones();
</script>
