<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Your Guitars | ToneFit</title>
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563EB;--blue-dark:#1D4ED8;--text:#0D1117;--muted:#6B7280;--border:#E5E7EB;--bg:#F0F4FA}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAVBAR */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:16px 24px;display:flex;align-items:center;background:transparent}
.hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;background:#fff;border:none;padding:12px 14px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.10)}
.hamburger span{width:20px;height:2px;background:#1a1a2e;border-radius:2px;display:block}

/* PROGRESS BAR */
.progress-bar{position:fixed;top:0;left:0;width:35%;height:3px;background:#2563EB;z-index:300;transition:width 0.4s}

/* MAIN */
main{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:80px 24px 60px;background:linear-gradient(160deg,#E8EEF8 0%,#EEF3FB 30%,#F5F8FF 60%,#ffffff 100%)}

.page-wrap{max-width:540px;width:100%;padding-top:20px}

/* header */
.page-header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.guitar-circle{width:52px;height:52px;background:#EEF4FF;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.guitar-circle svg{width:24px;height:24px;stroke:#2563EB;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.header-text-title{font-size:22px;font-weight:900;letter-spacing:-0.5px;color:#0D1117}
.header-text-sub{font-size:13px;color:#6B7280;font-weight:400;margin-top:2px}

/* selected tags */
.selected-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;min-height:0}
.sel-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:#EFF6FF;border:1.5px solid #BFDBFE;
  border-radius:100px;padding:7px 14px;
  font-size:13px;font-weight:600;color:#1E3A8A;
}
.sel-tag-x{background:none;border:none;cursor:pointer;color:#93C5FD;font-size:14px;line-height:1;padding:0;font-family:'Plus Jakarta Sans',sans-serif}
.sel-tag-x:hover{color:#2563EB}

/* search box */
.search-box{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  background:white;border:1.5px solid #E5E7EB;border-radius:14px;
  padding:14px 18px;cursor:pointer;
  transition:border-color 0.2s;
  margin-bottom:0;
}
.search-box.open{border-color:#2563EB;border-radius:14px 14px 0 0;border-bottom-color:transparent}
.search-box-left{display:flex;align-items:center;gap:10px;color:#9CA3AF;font-size:15px}
.search-box-left svg{width:18px;height:18px;stroke:#9CA3AF;fill:none;stroke-width:1.8;stroke-linecap:round}
.search-chevron{width:18px;height:18px;stroke:#9CA3AF;fill:none;stroke-width:2;stroke-linecap:round;transition:transform 0.2s}
.search-box.open .search-chevron{transform:rotate(180deg)}

/* dropdown */
.dropdown{
  background:white;border:1.5px solid #2563EB;
  border-top:none;border-radius:0 0 16px 16px;
  margin-bottom:20px;overflow:hidden;
  display:none;
}
.dropdown.open{display:block}
.dropdown-search{
  width:100%;border:none;border-bottom:1px solid #E5E7EB;
  padding:14px 18px;font-size:14px;color:#0D1117;
  font-family:'Plus Jakarta Sans',sans-serif;outline:none;
  background:#FAFBFD;
}
.dropdown-search::placeholder{color:#9CA3AF}

/* brand filter pills */
.brand-pills{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid #F3F4F6}
.brand-pills::-webkit-scrollbar{display:none}
.brand-pill{
  white-space:nowrap;background:none;border:1.5px solid #E5E7EB;
  border-radius:100px;padding:5px 14px;
  font-size:12px;font-weight:600;color:#374151;
  cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  transition:background 0.2s,border-color 0.2s;flex-shrink:0;
}
.brand-pill:hover{background:#F3F4F6}
.brand-pill.active{background:#EFF6FF;border-color:#BFDBFE;color:#2563EB}

/* guitar list */
.guitar-section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9CA3AF;padding:12px 18px 6px}
.guitar-list{max-height:220px;overflow-y:auto}
.guitar-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;cursor:pointer;
  transition:background 0.15s;
  border-bottom:1px solid #F9FAFB;
}
.guitar-row:hover{background:#F8FAFF}
.guitar-row.selected-row{background:#EFF6FF}
.guitar-checkbox{
  width:22px;height:22px;border-radius:6px;
  border:1.5px solid #D1D5DB;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,border-color 0.15s;
}
.guitar-row.selected-row .guitar-checkbox{background:#2563EB;border-color:#2563EB}
.guitar-checkbox svg{width:13px;height:13px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none}
.guitar-row.selected-row .guitar-checkbox svg{display:block}
.guitar-row-name{font-size:14px;font-weight:700;color:#0D1117;transition:color 0.15s}
.guitar-row.selected-row .guitar-row-name{color:#2563EB}
.guitar-row-desc{font-size:12px;color:#9CA3AF;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:360px}

/* can't find */
.cant-find{padding:14px 18px;border-top:1px solid #F3F4F6}
.cant-find-label{font-size:13px;font-weight:700;color:#0D1117;margin-bottom:4px}
.cant-find-sub{font-size:12px;color:#9CA3AF;margin-bottom:10px}
.cant-find-row{display:flex;gap:8px}
.cant-find-input{
  flex:1;border:1.5px solid #E5E7EB;border-radius:10px;
  padding:10px 14px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;
  outline:none;color:#0D1117;background:#FAFBFD;
}
.cant-find-input:focus{border-color:#2563EB}
.cant-find-add{
  background:#E5E7EB;color:#9CA3AF;border:none;
  border-radius:10px;padding:10px 18px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
}

/* quick select */
.quick-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9CA3AF;margin:20px 0 10px}
.quick-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.quick-pill{
  background:white;border:1.5px solid #E5E7EB;
  border-radius:100px;padding:8px 16px;
  font-size:13px;font-weight:600;color:#374151;
  cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  transition:background 0.15s,border-color 0.15s,color 0.15s;
}
.quick-pill:hover{background:#F3F4F6}
.quick-pill.selected{background:#EFF6FF;border-color:#BFDBFE;color:#2563EB}

/* CTA button */
.cta-btn{
  width:100%;background:#2563EB;color:white;
  border:none;padding:17px;border-radius:100px;
  font-size:16px;font-weight:700;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
  transition:background 0.2s;margin-bottom:16px;
}
.cta-btn:hover{background:#1D4ED8}
.cta-btn:disabled{background:#E5E7EB;color:#9CA3AF;cursor:not-allowed}

/* bottom row */
.bottom-row{display:flex;justify-content:space-between;align-items:center}
.back-btn{font-size:14px;color:#9CA3AF;font-weight:600;background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.back-btn:hover{color:#6B7280}
.add-later{font-size:14px;color:#9CA3AF;font-weight:500;background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.add-later:hover{color:#6B7280}
</style>
</head>

<div class="progress-bar" id="progressBar"></div>
<nav><button class="hamburger"><span></span><span></span><span></span></button></nav>

      <div class="brand-pills" id="brandPills">

        <button class="brand-pill" onclick="filterBrand('EVH',this)">EVH</button>

        <button class="brand-pill" onclick="filterBrand('Guild',this)">Guild</button>
        <button class="brand-pill" onclick="filterBrand('Reverend',this)">Reverend</button>
        <button class="brand-pill" onclick="filterBrand('Danelectro',this)">Danelectro</button>

      </div>
      <div class="guitar-section-label">POPULAR</div>
      <div class="guitar-list" id="guitarList"></div>
      <div class="cant-find">
        <div class="cant-find-label">Can't find your guitar?</div>
        <div class="cant-find-sub">Include brand and model (e.g. "Fender Stratocaster")</div>
        <div class="cant-find-row">
          <input class="cant-find-input" placeholder="Brand + Model..."/>
          <button class="cant-find-add">Add</button>
        </div>
      </div>
    </div>

    <!-- quick select -->
    <div class="quick-label">QUICK SELECT</div>
    <div class="quick-pills" id="quickPills">
      <button class="quick-pill" onclick="quickSelect(this,'Fender Stratocaster')">Fender Stratocaster</button>
      <button class="quick-pill" onclick="quickSelect(this,'Squier Stratocaster')">Squier Stratocaster</button>
      <button class="quick-pill" onclick="quickSelect(this,'Epiphone Les Paul')">Epiphone Les Paul</button>
      <button class="quick-pill" onclick="quickSelect(this,'Gibson Les Paul')">Gibson Les Paul</button>
      <button class="quick-pill" onclick="quickSelect(this,'Fender Telecaster')">Fender Telecaster</button>
      <button class="quick-pill" onclick="quickSelect(this,'Squier Telecaster')">Squier Telecaster</button>
    </div>

    <button class="cta-btn" id="ctaBtn" disabled onclick="goNext()">Select a guitar to continue</button>

    <div class="bottom-row">
      <button class="back-btn" onclick="history.back()">Back</button>
      <button class="add-later" onclick="skipOnboarding()">I'll set up my gear later</button>
    </div>

  </div>
</main>

let selected = [];
let currentBrand = 'all';

function renderGuitarList(list) {
  const el = document.getElementById('guitarList');
  el.innerHTML = list.map(g => `
    <div class="guitar-row ${selected.includes(g.name)?'selected-row':''}" onclick="toggleGuitar('${g.name}',this)">
      <div class="guitar-checkbox"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div>
        <div class="guitar-row-name">${g.name}</div>
        <div class="guitar-row-desc">${g.desc}</div>
      </div>
    </div>
  `).join('');
}

function filterGuitars(q) {
  const filtered = guitars.filter(g =>
    g.name.toLowerCase().includes(q.toLowerCase()) &&
    (currentBrand === 'all' || g.brand === currentBrand)
  );
  renderGuitarList(filtered);
}

function filterBrand(brand, el) {
  currentBrand = brand;
  document.querySelectorAll('.brand-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  filterGuitars(document.querySelector('.dropdown-search').value);
}

function toggleDropdown() {
  const box = document.getElementById('searchBox');
  const drop = document.getElementById('dropdown');
  box.classList.toggle('open');
  drop.classList.toggle('open');
  if(drop.classList.contains('open')) renderGuitarList(guitars);
}

function toggleGuitar(name, row) {
  if(selected.includes(name)) {
    selected = selected.filter(s => s !== name);
  } else {
    selected.push(name);
  }
  row.classList.toggle('selected-row');
  row.querySelector('.guitar-checkbox').querySelector('svg').style.display = selected.includes(name) ? 'block' : 'none';
  row.style.background = selected.includes(name) ? '#EFF6FF' : '';
  row.querySelector('.guitar-row-name').style.color = selected.includes(name) ? '#2563EB' : '';
  updateUI();
}

function quickSelect(el, name) {
  el.classList.toggle('selected');
  if(selected.includes(name)) {
    selected = selected.filter(s => s !== name);
  } else {
    selected.push(name);
  }
  updateUI();
}

function removeTag(name) {
  selected = selected.filter(s => s !== name);
  // deselect quick pill if exists
  document.querySelectorAll('.quick-pill').forEach(p => {
    if(p.textContent.trim() === name) p.classList.remove('selected');
  });
  updateUI();
  renderGuitarList(guitars);
}

function updateUI() {
  // tags
  const tagsEl = document.getElementById('selectedTags');
  tagsEl.innerHTML = selected.map(n => `
    <div class="sel-tag">${n}<button class="sel-tag-x" onclick="removeTag('${n}')">×</button></div>
  `).join('');
  // subtitle
  document.getElementById('selectedCount').textContent =
    selected.length === 0 ? 'Search and tap to select your guitar' :
    `${selected.length} guitar${selected.length>1?'s':''} selected`;
  // button
  const btn = document.getElementById('ctaBtn');
  if(selected.length === 0) {
    btn.disabled = true;
    btn.textContent = 'Select a guitar to continue';
  } else {
    btn.disabled = false;
    btn.textContent = `Continue with ${selected.length} guitar${selected.length>1?'s':''}`;
  }
}

renderGuitarList(guitars);
</script>
