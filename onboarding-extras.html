<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563EB;--blue-dark:#1D4ED8;--text:#0D1117;--muted:#6B7280;--border:#E5E7EB;--bg:#F0F4FA}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.progress-bar{position:fixed;top:0;left:0;width:85%;height:3px;background:#2563EB;z-index:300}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:16px 24px;display:flex;align-items:center;background:transparent}
.hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;background:#fff;border:none;padding:12px 14px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.10)}
.hamburger span{width:20px;height:2px;background:#1a1a2e;border-radius:2px;display:block}
main{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:80px 24px 60px;background:linear-gradient(160deg,#E8EEF8 0%,#EEF3FB 30%,#F5F8FF 60%,#ffffff 100%)}
.page-wrap{max-width:620px;width:100%;padding-top:20px}

/* header */
.page-header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.icon-circle{width:52px;height:52px;background:#EEF4FF;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-circle svg{width:22px;height:22px;stroke:#2563EB;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.header-title{font-size:22px;font-weight:900;letter-spacing:-0.5px;color:#0D1117}
.header-sub{font-size:13px;color:#6B7280;margin-top:2px}

/* 4-tab toggle */
.tab-wrap{background:#F1F4FA;border-radius:16px;padding:5px;display:flex;gap:2px;margin-bottom:20px}
.tab-btn{flex:1;padding:11px 8px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:#94A3B8;font-family:'Plus Jakarta Sans',sans-serif;transition:background 0.2s,color 0.2s,box-shadow 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}
.tab-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.tab-btn.active{background:white;color:#1E3A8A;box-shadow:0 2px 8px rgba(0,0,0,0.10)}

/* selected tags */
.selected-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:0}
.sel-tag{display:inline-flex;align-items:center;gap:6px;background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:100px;padding:7px 14px;font-size:13px;font-weight:600;color:#1E3A8A}
.sel-tag-x{background:none;border:none;cursor:pointer;color:#93C5FD;font-size:15px;line-height:1;padding:0;font-family:'Plus Jakarta Sans',sans-serif}
.sel-tag-x:hover{color:#2563EB}

/* search */
.search-box{width:100%;display:flex;align-items:center;justify-content:space-between;background:white;border:1.5px solid #E5E7EB;border-radius:14px;padding:14px 18px;cursor:pointer;transition:border-color 0.2s}
.search-box.open{border-color:#2563EB;border-radius:14px 14px 0 0;border-bottom-color:transparent}
.search-box-left{display:flex;align-items:center;gap:10px;color:#9CA3AF;font-size:15px}
.search-box-left svg{width:18px;height:18px;stroke:#9CA3AF;fill:none;stroke-width:1.8;stroke-linecap:round}
.search-chevron{width:18px;height:18px;stroke:#9CA3AF;fill:none;stroke-width:2;stroke-linecap:round;transition:transform 0.2s}
.search-box.open .search-chevron{transform:rotate(180deg)}
.dropdown{background:white;border:1.5px solid #2563EB;border-top:none;border-radius:0 0 16px 16px;margin-bottom:0;overflow:hidden;display:none}
.dropdown.open{display:block}
.dropdown-search{width:100%;border:none;border-bottom:1px solid #E5E7EB;padding:14px 18px;font-size:14px;color:#0D1117;font-family:'Plus Jakarta Sans',sans-serif;outline:none;background:#FAFBFD}
.dropdown-search::placeholder{color:#9CA3AF}
.brand-pills{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid #F3F4F6}
.brand-pills::-webkit-scrollbar{display:none}
.brand-pill{white-space:nowrap;background:none;border:1.5px solid #E5E7EB;border-radius:100px;padding:4px 12px;font-size:12px;font-weight:600;color:#374151;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:background 0.2s;flex-shrink:0}
.brand-pill:hover{background:#F3F4F6}
.brand-pill.active{background:#EFF6FF;border-color:#BFDBFE;color:#2563EB}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9CA3AF;padding:10px 16px 4px}
.item-list{max-height:200px;overflow-y:auto}
.item-row{display:flex;align-items:flex-start;gap:14px;padding:12px 16px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid #F9FAFB}
.item-row:hover{background:#F8FAFF}
.item-row.selected-row{background:#EFF6FF}
.item-checkbox{width:20px;height:20px;border-radius:5px;border:1.5px solid #D1D5DB;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background 0.15s,border-color 0.15s;margin-top:2px}
.item-row.selected-row .item-checkbox{background:#2563EB;border-color:#2563EB}
.item-checkbox svg{width:11px;height:11px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none}
.item-row.selected-row .item-checkbox svg{display:block}
.item-name{font-size:14px;font-weight:700;color:#0D1117}
.item-row.selected-row .item-name{color:#2563EB}
.item-desc{font-size:12px;color:#9CA3AF;margin-top:1px}
.cant-find{padding:12px 16px;border-top:1px solid #F3F4F6}
.cant-find-label{font-size:13px;font-weight:700;color:#0D1117;margin-bottom:3px}
.cant-find-sub{font-size:12px;color:#9CA3AF;margin-bottom:8px}
.cant-find-row{display:flex;gap:8px}
.cant-find-input{flex:1;border:1.5px solid #E5E7EB;border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;background:#FAFBFD}
.cant-find-input:focus{border-color:#2563EB}
.cant-find-add{background:#E5E7EB;color:#9CA3AF;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}

/* quick select */
.quick-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9CA3AF;margin:18px 0 10px}
.quick-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.quick-pill{background:white;border:1.5px solid #E5E7EB;border-radius:100px;padding:7px 14px;font-size:13px;font-weight:600;color:#374151;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:background 0.15s,border-color 0.15s,color 0.15s}
.quick-pill:hover{background:#F3F4F6}
.quick-pill.selected{background:#EFF6FF;border-color:#BFDBFE;color:#2563EB}

/* divider */
.section-divider{height:1px;background:#E5E7EB;margin:20px 0}

/* CTA */
.cta-btn{width:100%;background:#2563EB;color:white;border:none;padding:17px;border-radius:100px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:background 0.2s;margin-bottom:16px}
.cta-btn:hover{background:#1D4ED8}
.cta-btn:disabled{background:#E5E7EB;color:#9CA3AF;cursor:not-allowed}
.bottom-row{display:flex;justify-content:space-between;align-items:center}
.back-btn{font-size:14px;color:#9CA3AF;font-weight:600;background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.back-btn:hover{color:#6B7280}
.skip-btn{font-size:14px;color:#9CA3AF;font-weight:500;background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
</style>
</head>

<main>
<div class="page-wrap">

  </div>

  <!-- SELECTED TAGS -->
  <div class="selected-tags" id="selectedTags"></div>

  <!-- SEARCH BOX -->
  <div class="search-box" id="searchBox" onclick="toggleDropdown()">

      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span id="searchPlaceholder">Search pedals...</span>
    </div>
    <svg class="search-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </div>

  <!-- DROPDOWN -->
  <div class="dropdown" id="dropdown">
    <input class="dropdown-search" id="dropdownSearch" placeholder="Search pedals..." oninput="filterItems(this.value)"/>
    <div class="brand-pills" id="brandPills"></div>
    <div class="section-label">POPULAR</div>
    <div class="item-list" id="itemList"></div>
    <div class="cant-find">
      <div class="cant-find-label" id="cantFindLabel">Can't find your pedal?</div>
      <div class="cant-find-sub" id="cantFindSub">Include brand and model (e.g. "Boss DS-1")</div>
      <div class="cant-find-row">
        <input class="cant-find-input" placeholder="Brand + Model..."/>
        <button class="cant-find-add">Add</button>
      </div>
    </div>
  </div>

  <!-- QUICK SELECT -->
  <div class="quick-label">QUICK SELECT</div>
  <div class="quick-pills" id="quickPills"></div>

  <div class="section-divider"></div>

  <button class="cta-btn" id="ctaBtn" disabled onclick="goNext()">Skip for now</button>
  <div class="bottom-row">
    <button class="back-btn" onclick="history.back()">Back</button>
    <button class="skip-btn" onclick="skipOnboarding()">Skip for now</button>
  </div>

</div>
</main>

let currentTab = 'pedals';
let currentBrand = 'all';
// Store selections per tab (multifx inherits from amp page via localStorage simulation)
const selections = {pedals:[],multifx:[],bass:[],bassamp:[]};

// Simulate inheriting Multi-FX from previous amp page
// In real app this would come from state/localStorage
const inheritedMultiFX = []; // empty unless passed from amp page

function setTab(tab) {
  currentTab = tab;
  currentBrand = 'all';
  ['pedals','multifx','bass','bassamp'].forEach(t => {
    const idMap = {pedals:'tabPedals',multifx:'tabMultiFX',bass:'tabBass',bassamp:'tabBassAmp'};
    document.getElementById(idMap[t]).classList.remove('active');
  });
  const tabMap = {pedals:'tabPedals',multifx:'tabMultiFX',bass:'tabBass',bassamp:'tabBassAmp'};
  document.getElementById(tabMap[tab]).classList.add('active');
  const cfg = db[tab];
  const placeholders = {pedals:'Search pedals...',multifx:'Search multi-FX units...',bass:'Search bass guitars...',bassamp:'Search bass amps...'};
  const cantFind = {pedals:['Can\'t find your pedal?','Include brand and model (e.g. "Boss DS-1")'],multifx:['Can\'t find your multi-FX unit?','Include brand and model (e.g. "Line 6 Helix")'],bass:['Can\'t find your bass?','Include brand and model (e.g. "Fender Jazz Bass")'],bassamp:['Can\'t find your bass amp?','Include brand and model (e.g. "Ampeg SVT")']};
  document.getElementById('searchPlaceholder').textContent = placeholders[tab];
  document.getElementById('dropdownSearch').placeholder = placeholders[tab];
  document.getElementById('cantFindLabel').textContent = cantFind[tab][0];
  document.getElementById('cantFindSub').textContent = cantFind[tab][1];
  document.getElementById('searchBox').classList.remove('open');
  document.getElementById('dropdown').classList.remove('open');
  renderBrandPills();
  renderQuickPills();
  updateUI();
}

function renderBrandPills() {
  const brands = db[currentTab].brands;
  document.getElementById('brandPills').innerHTML =
    `<button class="brand-pill active" onclick="filterBrand('all',this)">All</button>` +
    brands.map(b=>`<button class="brand-pill" onclick="filterBrand('${b.replace(/'/g,"\\'")}',this)">${b}</button>`).join('');
}

function renderQuickPills() {
  const pills = db[currentTab].quick;
  const sel = selections[currentTab];
  document.getElementById('quickPills').innerHTML = pills.map(p=>
    `<button class="quick-pill ${sel.includes(p)?'selected':''}" onclick="quickSelect(this,'${p.replace(/'/g,"\\'")}')">${p}</button>`
  ).join('');
}

function filterBrand(brand, el) {
  currentBrand = brand;
  document.querySelectorAll('.brand-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  filterItems(document.getElementById('dropdownSearch').value);
}

function filterItems(q) {
  const items = db[currentTab].items.filter(i=>
    i.n.toLowerCase().includes(q.toLowerCase()) &&
    (currentBrand==='all' || i.b===currentBrand)
  );
  renderItemList(items);
}

function renderItemList(items) {
  const sel = selections[currentTab];
  document.getElementById('itemList').innerHTML = items.map(i=>`
    <div class="item-row ${sel.includes(i.n)?'selected-row':''}" onclick="toggleItem('${i.n.replace(/'/g,"\\'")}')">
      <div class="item-checkbox"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div><div class="item-name">${i.n}</div><div class="item-desc">${i.d}</div></div>
    </div>`).join('');
}

function toggleDropdown() {
  document.getElementById('searchBox').classList.toggle('open');
  document.getElementById('dropdown').classList.toggle('open');
  if(document.getElementById('dropdown').classList.contains('open')) {
    renderItemList(db[currentTab].items);
  }
}

function toggleItem(name) {
  const sel = selections[currentTab];
  if(sel.includes(name)) selections[currentTab]=sel.filter(s=>s!==name);
  else selections[currentTab].push(name);
  localStorage.setItem('tonefit_extras', JSON.stringify(selections));
  renderItemList(db[currentTab].items.filter(i=>currentBrand==='all'||i.b===currentBrand));
  renderQuickPills();
  updateUI();
}

function quickSelect(el,name) {
  el.classList.toggle('selected');
  const sel = selections[currentTab];
  if(sel.includes(name)) selections[currentTab]=sel.filter(s=>s!==name);
  else selections[currentTab].push(name);
  localStorage.setItem('tonefit_extras', JSON.stringify(selections));
  updateUI();
}

function removeTag(name) {
  selections[currentTab]=selections[currentTab].filter(s=>s!==name);
  localStorage.setItem('tonefit_extras', JSON.stringify(selections));
  renderQuickPills();
  renderItemList(db[currentTab].items);
  updateUI();
}

function getTotalSelected() {
  return Object.values(selections).flat().length;
}

function updateUI() {
  const sel = selections[currentTab];
  document.getElementById('selectedTags').innerHTML = sel.map(n=>
    `<div class="sel-tag">${n}<button class="sel-tag-x" onclick="removeTag('${n.replace(/'/g,"\\'")}')">×</button></div>`
  ).join('');
  const total = getTotalSelected();
  const btn = document.getElementById('ctaBtn');
  if(total===0){btn.disabled=true;btn.textContent='Skip for now';}
  else{btn.disabled=false;btn.textContent=`Continue with ${total} extra${total>1?'s':''}`;}
}

// Load inherited Multi-FX selections from amp page via localStorage
try {
  const saved = localStorage.getItem('tonefit_multifx');
  if(saved) {
    const parsed = JSON.parse(saved);
    if(Array.isArray(parsed)) selections.multifx = parsed;
  }
} catch(e) {}

// Load inherited Multi-FX selections from amp page
const savedMultiFX = localStorage.getItem('tonefit_multifx');
if(savedMultiFX) {
  selections.multifx = JSON.parse(savedMultiFX);
}

// Init
renderBrandPills();
renderQuickPills();
updateUI();

function skipOnboarding() {
  localStorage.setItem('tonefit_onboarding_done', 'true');
  window.location.href = '/app';
}
function goNext() {
  window.location.href = '/onboarding-confirm';
}
