<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Privacy Policy | ToneFit</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563EB;--text:#0D1117;--muted:#6B7280;--border:#E5E7EB;--bg:#F0F4FA}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text)}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:20px 24px;display:flex;align-items:center;background:transparent;transition:background 0.3s}
nav.scrolled{background:rgba(240,244,250,0.92);backdrop-filter:blur(14px);box-shadow:0 1px 12px rgba(0,0,0,0.06)}
.hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;background:#fff;border:none;padding:12px 14px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.10)}
.hamburger span{width:20px;height:2px;background:#1a1a2e;border-radius:2px;display:block}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s}
.menu-overlay.open{opacity:1;pointer-events:all}
.slide-menu{position:fixed;top:0;left:0;width:300px;height:100vh;background:white;z-index:400;transform:translateX(-100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;padding:28px 24px 32px;overflow-y:auto}
.slide-menu.open{transform:translateX(0)}
.menu-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
.menu-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;color:var(--text);text-decoration:none}
.menu-logo-icon{width:38px;height:38px;border-radius:10px;overflow:hidden;flex-shrink:0}
.menu-close{background:none;border:none;font-size:22px;color:#9CA3AF;cursor:pointer}
.menu-divider{height:1px;background:#F3F4F6;margin:18px 0}
.menu-login{display:block;text-align:center;padding:12px;font-size:16px;font-weight:600;color:var(--text);text-decoration:none;margin-bottom:10px;border-radius:12px}
.menu-signup{display:block;background:var(--blue);color:white;text-align:center;padding:15px;border-radius:14px;font-size:16px;font-weight:700;text-decoration:none}
.page-wrap{max-width:740px;margin:0 auto;padding:110px 24px 80px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--muted);text-decoration:none;margin-bottom:36px;font-weight:500;transition:color 0.2s}
.back-link:hover{color:var(--text)}
.page-title{font-size:clamp(28px,4vw,40px);font-weight:900;letter-spacing:-1.5px;margin-bottom:8px}
.page-date{font-size:13px;color:var(--muted);margin-bottom:40px}
.legal-body{font-size:15px;line-height:1.8;color:#374151}
.legal-body h2{font-size:20px;font-weight:800;color:var(--text);margin:36px 0 12px;letter-spacing:-0.4px}
.legal-body h3{font-size:16px;font-weight:700;color:var(--text);margin:24px 0 8px}
.legal-body p{margin-bottom:16px}
.legal-body ul,.legal-body ol{padding-left:20px;margin-bottom:16px}
.legal-body li{margin-bottom:8px}
.legal-body a{color:var(--blue);text-decoration:none}
.legal-body a:hover{text-decoration:underline}
.legal-body strong{font-weight:700;color:var(--text)}
footer{background:#0F0F13;padding:32px 48px;text-align:center;margin-top:60px}
footer p{font-size:13px;color:rgba(255,255,255,0.28)}
footer a{color:rgba(255,255,255,0.4);text-decoration:none;margin:0 8px}
footer a:hover{color:white}
</style>
</head>
<body>
<div class="menu-overlay" id="menuOverlay"></div>
<div class="slide-menu" id="slideMenu">
  <div class="menu-header">
    <a href="/" class="menu-logo">
      <div class="menu-logo-icon"><svg width="38" height="38" viewBox="0 0 38 38"><rect width="38" height="38" rx="9" fill="#2563EB"/><line x1="13" y1="7" x2="13" y2="31" stroke="white" stroke-width="2.4" stroke-linecap="round"/><line x1="19" y1="5" x2="19" y2="31" stroke="white" stroke-width="2.4" stroke-linecap="round"/><line x1="25" y1="7" x2="25" y2="31" stroke="white" stroke-width="2.4" stroke-linecap="round"/><line x1="10" y1="26" x2="28" y2="26" stroke="white" stroke-width="2.4" stroke-linecap="round"/><polyline points="15,18 19,23 27,13" fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span>Tone<span style="color:#2563EB">Fit</span></span>
    </a>
    <button class="menu-close" id="menuClose">✕</button>
  </div>
  <div class="menu-divider"></div>
  <a href="/login" class="menu-login">Login</a>
  <a href="/signup" class="menu-signup">Sign Up</a>
</div>
<nav id="navbar"><button class="hamburger" id="menuOpen"><span></span><span></span><span></span></button></nav>

<div class="page-wrap">
  <a href="/" class="back-link">← Back to Home</a>
  <h1 class="page-title">ToneFit Privacy Policy</h1>
  <p class="page-date">Last Updated: May 1, 2026</p>
  <div class="legal-body" id="legalContent">Loading...</div>
</div>

<footer>
  <p>© 2026 ToneFit. All rights reserved. &nbsp;·&nbsp; <a href="/privacy">Privacy</a> <a href="/terms">Terms</a></p>
</footer>
<script>
const nav=document.getElementById('navbar');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>20));
document.getElementById('menuOpen').addEventListener('click',()=>{document.getElementById('slideMenu').classList.add('open');document.getElementById('menuOverlay').classList.add('open')});
document.getElementById('menuClose').addEventListener('click',()=>{document.getElementById('slideMenu').classList.remove('open');document.getElementById('menuOverlay').classList.remove('open')});
document.getElementById('menuOverlay').addEventListener('click',()=>{document.getElementById('slideMenu').classList.remove('open');document.getElementById('menuOverlay').classList.remove('open')});
document.getElementById('legalContent').innerHTML = '<p>The full legal text for this page would be loaded here from your backend. For now, please refer to the original ToneAdapt policy and update the company name to ToneFit, LLC and the contact email to contact@tonefit.com.</p>';
</script>
</body></html>
